name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # lets you trigger manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.VPS_IP }} \
            "bash /opt/zettair-search/deploy/deploy.sh"