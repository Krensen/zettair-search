<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zettair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      color: #202124;
      background: #fff;
    }

    /* ── HOMEPAGE (pre-search) ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    #home .top-nav {
      align-self: flex-end;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: #202124;
    }

    #home .logo {
      margin-top: 15vh;
      margin-bottom: 1.5rem;
      font-size: 4rem;
      font-weight: 400;
      letter-spacing: -1px;
    }

    #home .logo span:nth-child(1) { color: #4285f4; }
    #home .logo span:nth-child(2) { color: #ea4335; }
    #home .logo span:nth-child(3) { color: #fbbc05; }
    #home .logo span:nth-child(4) { color: #4285f4; }
    #home .logo span:nth-child(5) { color: #34a853; }
    #home .logo span:nth-child(6) { color: #ea4335; }
    #home .logo span:nth-child(7) { color: #4285f4; }

    .search-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 584px;
      padding: 0 1rem;
    }

    .search-box {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.55rem 1rem;
      gap: 0.5rem;
      background: #fff;
      box-shadow: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .search-box svg { flex-shrink: 0; color: #9aa0a6; }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .search-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .search-buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 0.875rem;
      padding: 0.55rem 1rem;
      cursor: pointer;
    }

    .search-buttons button:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
      color: #202124;
    }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem 0;
      gap: 1.5rem;
      border-bottom: 1px solid #ebebeb;
      flex-wrap: wrap;
    }

    .results-header .logo-small {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      text-decoration: none;
      cursor: pointer;
    }

    .results-header .logo-small span:nth-child(1) { color: #4285f4; }
    .results-header .logo-small span:nth-child(2) { color: #ea4335; }
    .results-header .logo-small span:nth-child(3) { color: #fbbc05; }
    .results-header .logo-small span:nth-child(4) { color: #4285f4; }
    .results-header .logo-small span:nth-child(5) { color: #34a853; }
    .results-header .logo-small span:nth-child(6) { color: #ea4335; }
    .results-header .logo-small span:nth-child(7) { color: #4285f4; }

    .results-search-box {
      flex: 1;
      max-width: 584px;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.45rem 1rem;
      gap: 0.5rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .results-search-box:hover, .results-search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .results-search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .results-search-box button {
      background: none;
      border: none;
      cursor: pointer;
      color: #4285f4;
      padding: 0.2rem;
    }

    .results-body {
      max-width: 652px;
      margin: 0 0 0 calc(max(1.5rem, 50vw - 480px));
      padding: 0.75rem 1rem 2rem;
    }

    .results-meta {
      font-size: 0.85rem;
      color: #70757a;
      padding: 0.5rem 0 1rem;
    }

    .result-item {
      margin-bottom: 1.75rem;
      max-width: 600px;
    }

    .result-title {
      font-size: 1.1rem;
      color: #1a0dab;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.2rem;
      cursor: default;
    }

    .result-url {
      font-size: 0.8rem;
      color: #202124;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .result-url .domain {
      color: #202124;
      font-size: 0.85rem;
    }

    .result-url .score-pill {
      font-size: 0.72rem;
      color: #70757a;
    }

    .result-snippet {
      font-size: 0.875rem;
      color: #4d5156;
      line-height: 1.58;
    }

    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid #ebebeb;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 3rem auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results {
      padding: 2rem 0;
      color: #70757a;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <div class="top-nav">Hugh's Search</div>
  <div class="logo" aria-label="Zettair">
    <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
  </div>
  <form class="search-wrap" id="homeForm">
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="homeQuery" autocomplete="off" autofocus />
    </div>
    <div class="search-buttons">
      <button type="submit">Zettair Search</button>
    </div>
  </form>
</div>

<!-- RESULTS PAGE -->
<div id="results-page">
  <div class="results-header">
    <div class="logo-small" id="logoBack" role="button" tabindex="0">
      <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
    </div>
    <form class="results-search-box" id="resultsForm">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="resultsQuery" />
      <button type="submit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </form>
  </div>

  <div class="results-body">
    <div class="results-meta" id="resultsMeta"></div>
    <div class="spinner" id="spinner"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const homePage = document.getElementById('home');
  const resultsPage = document.getElementById('results-page');
  const homeQuery = document.getElementById('homeQuery');
  const resultsQuery = document.getElementById('resultsQuery');
  const resultsMeta = document.getElementById('resultsMeta');
  const resultsList = document.getElementById('resultsList');
  const spinner = document.getElementById('spinner');

  document.getElementById('homeForm').addEventListener('submit', e => {
    e.preventDefault();
    const q = homeQuery.value.trim();
    if (q) doSearch(q);
  });

  document.getElementById('resultsForm').addEventListener('submit', e => {
    e.preventDefault();
    const q = resultsQuery.value.trim();
    if (q) doSearch(q);
  });

  document.getElementById('logoBack').addEventListener('click', () => {
    resultsPage.style.display = 'none';
    homePage.style.display = 'flex';
    homeQuery.value = '';
    homeQuery.focus();
  });

  async function doSearch(q) {
    // Switch to results view
    homePage.style.display = 'none';
    resultsPage.style.display = 'block';
    resultsQuery.value = q;
    resultsMeta.textContent = '';
    resultsList.innerHTML = '';
    spinner.style.display = 'block';

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(q)}&n=25`);
      const data = await res.json();
      spinner.style.display = 'none';

      if (!data.results || data.results.length === 0) {
        resultsList.innerHTML = '<div class="no-results">No results found for <strong>' + escHtml(q) + '</strong>.</div>';
        return;
      }

      resultsMeta.textContent = `About ${data.total.toLocaleString()} results (${data.took_ms} ms)`;

      resultsList.innerHTML = data.results.map(r => `
        <div class="result-item">
          <div class="result-url">
            <span class="domain">zettair.local</span>
            <span class="result-url"> › </span>
            <span class="score-pill">score ${r.score.toFixed(3)} · doc #${r.docid}</span>
          </div>
          <div class="result-title">${escHtml(r.title)}</div>
          <div class="result-snippet">${escHtml(r.snippet)}</div>
        </div>
      `).join('');

    } catch (err) {
      spinner.style.display = 'none';
      resultsList.innerHTML = '<div class="no-results">Something went wrong: ' + escHtml(err.message) + '</div>';
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
