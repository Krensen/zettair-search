<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zettair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
    }

    /* ── HOMEPAGE ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    #home .top-nav {
      align-self: flex-end;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: #202124;
    }

    #home .logo {
      margin-top: 15vh;
      margin-bottom: 1.75rem;
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: -1px;
    }

    #home .logo span:nth-child(1) { color: #4285f4; }
    #home .logo span:nth-child(2) { color: #ea4335; }
    #home .logo span:nth-child(3) { color: #fbbc05; }
    #home .logo span:nth-child(4) { color: #4285f4; }
    #home .logo span:nth-child(5) { color: #34a853; }
    #home .logo span:nth-child(6) { color: #ea4335; }
    #home .logo span:nth-child(7) { color: #4285f4; }

    .search-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 584px;
      padding: 0 1rem;
    }

    .search-box {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.65rem 1.1rem;
      gap: 0.6rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .search-box svg { flex-shrink: 0; color: #9aa0a6; }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .search-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .search-buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 0.875rem;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
    }

    .search-buttons button:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      gap: 1.5rem;
      border-bottom: 1px solid #ebebeb;
      flex-wrap: wrap;
    }

    .logo-small {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      cursor: pointer;
      text-decoration: none;
      padding-bottom: 2px;
    }

    .logo-small span:nth-child(1) { color: #4285f4; }
    .logo-small span:nth-child(2) { color: #ea4335; }
    .logo-small span:nth-child(3) { color: #fbbc05; }
    .logo-small span:nth-child(4) { color: #4285f4; }
    .logo-small span:nth-child(5) { color: #34a853; }
    .logo-small span:nth-child(6) { color: #ea4335; }
    .logo-small span:nth-child(7) { color: #4285f4; }

    .results-search-box {
      flex: 1;
      max-width: 584px;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.55rem 1.1rem;
      gap: 0.6rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .results-search-box:hover, .results-search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .results-search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .results-search-box .search-icon {
      flex-shrink: 0;
      color: #9aa0a6;
      transition: color 0.2s;
    }
    .results-search-box.loading .search-icon {
      color: #4285f4;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    .results-body {
      max-width: 700px;
      margin: 0 0 0 calc(max(1.5rem, 50vw - 490px));
      padding: 0.5rem 1rem 3rem;
    }

    .results-meta {
      font-size: 0.8rem;
      color: #70757a;
      padding: 0.6rem 0 1.25rem;
      min-height: 2.2rem;
    }

    /* ── KNOWLEDGE PANEL ── */
    .knowledge-panel {
      display: flex;
      gap: 1.25rem;
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.75rem;
      max-width: 620px;
      align-items: flex-start;
    }

    .knowledge-panel img {
      width: 112px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .knowledge-panel-text { flex: 1; min-width: 0; }

    .knowledge-panel-text .kp-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #202124;
      margin-bottom: 2px;
      display: block;
      text-decoration: none;
    }

    .knowledge-panel-text .kp-title:hover { text-decoration: underline; }

    .knowledge-panel-text .kp-source {
      font-size: 0.75rem;
      color: #70757a;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .knowledge-panel-text .kp-source img {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: none;
      flex-shrink: 0;
    }

    .knowledge-panel-text p {
      font-size: 0.875rem;
      color: #4d5156;
      line-height: 1.6;
    }

    /* ── RESULT ITEMS ── */
    .result-item {
      margin-bottom: 2rem;
      max-width: 620px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .result-text { flex: 1; min-width: 0; }

    /* Source line: favicon + site name + breadcrumb path */
    .result-source {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .result-favicon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #e8eaed;
      flex-shrink: 0;
      background: #f1f3f4;
    }

    .result-site {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      min-width: 0;
    }

    .result-site-name {
      font-size: 0.875rem;
      color: #202124;
    }

    .result-breadcrumb {
      font-size: 0.78rem;
      color: #4d5156;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 460px;
    }

    .result-title {
      font-size: 1.2rem;
      color: #1a0dab;
      font-weight: 400;
      line-height: 1.3;
      margin: 4px 0 5px;
      text-decoration: none;
      display: block;
    }

    .result-title:hover { text-decoration: underline; }
    .result-title:visited { color: #609; }

    .result-snippet {
      font-size: 0.9rem;
      color: #4d5156;
      line-height: 1.6;
    }

    /* Thumbnail — right-aligned, centred on the card */
    .result-thumb-wrap { flex-shrink: 0; }

    .result-thumb {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid #e8eaed;
    }

    .no-results {
      padding: 2rem 0;
      color: #70757a;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .results-body { margin-left: 1rem; padding-right: 1rem; }
      .knowledge-panel { flex-direction: column; }
      .knowledge-panel img { width: 100%; height: 200px; }
      .result-thumb { width: 68px; height: 68px; }
    }

    /* ── AUTOSUGGEST DROPDOWN ── */
    .suggest-wrap {
      position: relative;
      width: 100%;
    }

    .suggest-dropdown {
      display: none;
      position: absolute;
      top: calc(100% - 1px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid rgba(223,225,229,0);
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(32,33,36,0.28);
      z-index: 100;
      overflow: hidden;
    }

    .suggest-dropdown.open { display: block; }

    /* When dropdown is open, square the bottom of the search box */
    .search-box.suggest-open,
    .results-search-box.suggest-open {
      border-radius: 24px 24px 0 0;
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .suggest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggest-item:hover,
    .suggest-item.active {
      background: #f8f9fa;
    }

    .suggest-item svg { flex-shrink: 0; color: #9aa0a6; }

    .suggest-item .suggest-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    .suggest-item .suggest-match { font-weight: 700; }

    .suggest-divider {
      height: 1px;
      background: #e8eaed;
      margin: 0 16px;
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <div class="top-nav">Hugh's Search</div>
  <div class="logo">
    <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
  </div>
  <form class="search-wrap" id="homeForm">
    <div class="suggest-wrap">
      <div class="search-box" id="homeSearchBox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="homeQuery" autocomplete="off" autofocus placeholder="Search Wikipedia…" />
      </div>
      <div class="suggest-dropdown" id="homeSuggest"></div>
    </div>
    <div class="search-buttons">
      <button type="submit">Zettair Search</button>
    </div>
  </form>
</div>

<!-- RESULTS PAGE -->
<div id="results-page">
  <div class="results-header">
    <div class="logo-small" id="logoBack">
      <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
    </div>
    <div class="suggest-wrap" style="flex:1;max-width:584px;">
      <form class="results-search-box" id="resultsForm">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="resultsQuery" autocomplete="off" />
      </form>
      <div class="suggest-dropdown" id="resultsSuggest"></div>
    </div>
  </div>

  <div class="results-body">
    <div class="results-meta" id="resultsMeta"></div>
    <div id="knowledgePanel"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const homePage       = document.getElementById('home');
  const resultsPage    = document.getElementById('results-page');
  const homeQuery      = document.getElementById('homeQuery');
  const resultsQuery   = document.getElementById('resultsQuery');
  const resultsMeta    = document.getElementById('resultsMeta');
  const resultsList    = document.getElementById('resultsList');
  const knowledgePanel = document.getElementById('knowledgePanel');
  const resultsForm    = document.getElementById('resultsForm');

  let debounceTimer = null;
  let currentController = null;

  document.getElementById('homeForm').addEventListener('submit', e => {
    e.preventDefault();
    const q = homeQuery.value.trim();
    if (q) doSearch(q);
  });

  resultsForm.addEventListener('submit', e => {
    e.preventDefault();
    const q = resultsQuery.value.trim();
    if (q) doSearch(q);
  });

  resultsQuery.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = resultsQuery.value.trim();
    if (!q) { resultsMeta.textContent = ''; resultsList.innerHTML = ''; knowledgePanel.innerHTML = ''; return; }
    if (q.length < 2) return;
    debounceTimer = setTimeout(() => doSearch(q, true), 300);
  });

  document.getElementById('logoBack').addEventListener('click', () => {
    resultsPage.style.display = 'none';
    homePage.style.display = 'flex';
    homeQuery.value = '';
    homeQuery.focus();
  });

  async function doSearch(q, isInstant = false) {
    if (currentController) currentController.abort();
    currentController = new AbortController();

    homePage.style.display = 'none';
    resultsPage.style.display = 'block';
    resultsQuery.value = q;
    resultsForm.classList.add('loading');

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(q)}&n=25`, { signal: currentController.signal });
      const data = await res.json();
      resultsForm.classList.remove('loading');

      if (!data.results || data.results.length === 0) {
        resultsMeta.textContent = 'No results found.';
        resultsList.innerHTML = '';
        knowledgePanel.innerHTML = '';
        return;
      }

      resultsMeta.textContent = `About ${data.total.toLocaleString()} results (${data.took_ms} ms)`;

      // Knowledge panel — top result with image
      const top = data.results[0];
      if (top.image_url) {
        const title = formatTitle(top.docno);
        const wikiUrl = wikiLink(top.docno);
        knowledgePanel.innerHTML = `
          <div class="knowledge-panel">
            <img src="${esc(proxyImg(top.image_url))}" alt="${esc(title)}"
                 onerror="this.closest('.knowledge-panel').style.display='none'">
            <div class="knowledge-panel-text">
              <a class="kp-title" href="${esc(wikiUrl)}" target="_blank" rel="noopener noreferrer"
                 onclick="logClick(${JSON.stringify(q)}, ${JSON.stringify(top.docno)}, 1, ${top.score})"
              >${esc(title)}</a>
              <div class="kp-source">
                <img src="https://www.google.com/s2/favicons?domain=simple.wikipedia.org&sz=32" alt="">
                <span>Wikipedia · simple.wikipedia.org</span>
              </div>
              <p>${esc(top.snippet || '')}</p>
            </div>
          </div>`;
      } else {
        knowledgePanel.innerHTML = '';
      }

      // Results
      resultsList.innerHTML = data.results.map(r => {
        const title = formatTitle(r.docno);
        const url = wikiLink(r.docno);
        const crumb = `simple.wikipedia.org › wiki › ${r.docno.replace(/_/g, ' ')}`;
        const thumb = r.image_url
          ? `<div class="result-thumb-wrap">
               <img class="result-thumb" src="${esc(proxyImg(r.image_url))}" alt="${esc(title)}"
                 onerror="this.closest('.result-thumb-wrap').remove()">
             </div>`
          : '';
        return `
          <div class="result-item">
            <div class="result-text">
              <div class="result-source">
                <img class="result-favicon"
                  src="https://www.google.com/s2/favicons?domain=simple.wikipedia.org&sz=64" alt="">
                <div class="result-site">
                  <span class="result-site-name">Wikipedia</span>
                  <span class="result-breadcrumb">${esc(crumb)}</span>
                </div>
              </div>
              <a class="result-title" href="${esc(url)}" target="_blank" rel="noopener noreferrer"
                 onclick="logClick(${JSON.stringify(q)}, ${JSON.stringify(r.docno)}, ${r.rank}, ${r.score})"
              >${esc(title)}</a>
              <div class="result-snippet">${esc(r.snippet || '')}</div>
            </div>
            ${thumb}
          </div>`;
      }).join('');

    } catch (err) {
      if (err.name === 'AbortError') return;
      resultsForm.classList.remove('loading');
      resultsList.innerHTML = `<div class="no-results">Something went wrong: ${esc(err.message)}</div>`;
    }
  }

  // ── AUTOSUGGEST ──
  function setupSuggest(inputEl, dropdownEl, searchBoxEl) {
    let suggestTimer = null;
    let suggestController = null;
    let activeIdx = -1;
    let currentSuggestions = [];

    function closeSuggest() {
      dropdownEl.classList.remove('open');
      searchBoxEl.classList.remove('suggest-open');
      activeIdx = -1;
      currentSuggestions = [];
    }

    function renderSuggestions(suggestions, prefix) {
      if (!suggestions.length) { closeSuggest(); return; }
      currentSuggestions = suggestions;
      activeIdx = -1;

      dropdownEl.innerHTML = suggestions.map((s, i) => {
        // Bold the matching prefix
        const q = s.query;
        const boldPart = q.slice(0, prefix.length);
        const rest = q.slice(prefix.length);
        return `<div class="suggest-item" data-idx="${i}" data-query="${esc(q)}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="suggest-text"><span class="suggest-match">${esc(boldPart)}</span>${esc(rest)}</span>
        </div>`;
      }).join('');

      // Click on suggestion
      dropdownEl.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault(); // don't blur the input
          const q = el.dataset.query;
          inputEl.value = q;
          closeSuggest();
          doSearch(q);
        });
      });

      dropdownEl.classList.add('open');
      searchBoxEl.classList.add('suggest-open');
    }

    async function fetchSuggestions(prefix) {
      if (suggestController) suggestController.abort();
      suggestController = new AbortController();
      try {
        const res = await fetch(`/suggest?q=${encodeURIComponent(prefix)}&n=8`, {
          signal: suggestController.signal
        });
        const data = await res.json();
        renderSuggestions(data.suggestions || [], prefix);
      } catch(e) {
        if (e.name !== 'AbortError') closeSuggest();
      }
    }

    inputEl.addEventListener('input', () => {
      clearTimeout(suggestTimer);
      const val = inputEl.value.trim();
      if (val.length < 2) { closeSuggest(); return; }
      suggestTimer = setTimeout(() => fetchSuggestions(val.toLowerCase()), 150);
    });

    inputEl.addEventListener('keydown', e => {
      if (!dropdownEl.classList.contains('open')) return;
      const items = dropdownEl.querySelectorAll('.suggest-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, -1);
      } else if (e.key === 'Escape') {
        closeSuggest(); return;
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        const q = currentSuggestions[activeIdx].query;
        inputEl.value = q;
        closeSuggest();
        doSearch(q);
        return;
      } else {
        return;
      }
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      if (activeIdx >= 0) inputEl.value = currentSuggestions[activeIdx].query;
    });

    inputEl.addEventListener('blur', () => {
      // Small delay so mousedown on suggestion fires first
      setTimeout(closeSuggest, 150);
    });
  }

  // Wire up both search boxes
  setupSuggest(
    document.getElementById('homeQuery'),
    document.getElementById('homeSuggest'),
    document.getElementById('homeSearchBox')
  );
  setupSuggest(
    document.getElementById('resultsQuery'),
    document.getElementById('resultsSuggest'),
    document.getElementById('resultsForm')
  );

  function logClick(q, docno, rank, score) {
    // Fire-and-forget — don't block navigation
    fetch('/click', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({q, docno, rank, score}),
      keepalive: true,   // survives page navigation
    }).catch(() => {});
  }

  const proxyImg = url => url ? `/img?url=${encodeURIComponent(url)}` : null;
  const wikiLink = docno => `https://simple.wikipedia.org/wiki/${encodeURIComponent(docno)}`;
  const formatTitle = docno => (docno || '').replace(/_/g, ' ').replace(/\s*\(.*?\)\s*$/, '').trim();
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
</script>
</body>
</html>
