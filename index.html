<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zettair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
    }

    /* ── HOMEPAGE ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    #home .top-nav {
      align-self: flex-end;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: #202124;
    }

    #home .logo {
      margin-top: 15vh;
      margin-bottom: 1.5rem;
      font-size: 4rem;
      font-weight: 400;
      letter-spacing: -1px;
    }

    #home .logo span:nth-child(1) { color: #4285f4; }
    #home .logo span:nth-child(2) { color: #ea4335; }
    #home .logo span:nth-child(3) { color: #fbbc05; }
    #home .logo span:nth-child(4) { color: #4285f4; }
    #home .logo span:nth-child(5) { color: #34a853; }
    #home .logo span:nth-child(6) { color: #ea4335; }
    #home .logo span:nth-child(7) { color: #4285f4; }

    .search-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 584px;
      padding: 0 1rem;
    }

    .search-box {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.55rem 1rem;
      gap: 0.5rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .search-box svg { flex-shrink: 0; color: #9aa0a6; }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .search-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .search-buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 0.875rem;
      padding: 0.55rem 1rem;
      cursor: pointer;
    }

    .search-buttons button:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem 0;
      gap: 1.5rem;
      border-bottom: 1px solid #ebebeb;
      flex-wrap: wrap;
    }

    .logo-small {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-small span:nth-child(1) { color: #4285f4; }
    .logo-small span:nth-child(2) { color: #ea4335; }
    .logo-small span:nth-child(3) { color: #fbbc05; }
    .logo-small span:nth-child(4) { color: #4285f4; }
    .logo-small span:nth-child(5) { color: #34a853; }
    .logo-small span:nth-child(6) { color: #ea4335; }
    .logo-small span:nth-child(7) { color: #4285f4; }

    .results-search-box {
      flex: 1;
      max-width: 584px;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.45rem 1rem;
      gap: 0.5rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .results-search-box:hover, .results-search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .results-search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    /* Animated search icon when loading */
    .results-search-box .search-icon {
      flex-shrink: 0;
      color: #9aa0a6;
      transition: color 0.2s;
    }
    .results-search-box.loading .search-icon {
      color: #4285f4;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    .results-body {
      max-width: 652px;
      margin: 0 0 0 calc(max(1.5rem, 50vw - 480px));
      padding: 0.75rem 1rem 2rem;
    }

    .results-meta {
      font-size: 0.85rem;
      color: #70757a;
      padding: 0.5rem 0 1rem;
      min-height: 2rem;
    }

    /* ── KNOWLEDGE PANEL ── */
    .knowledge-panel {
      display: flex;
      gap: 1.2rem;
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      max-width: 600px;
    }

    .knowledge-panel img {
      width: 120px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .knowledge-panel-text h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #202124;
      margin-bottom: 0.4rem;
    }

    .knowledge-panel-text a {
      color: #1a0dab;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .knowledge-panel-text a:hover { text-decoration: underline; }

    .knowledge-panel-text p {
      font-size: 0.875rem;
      color: #4d5156;
      line-height: 1.55;
    }

    /* ── RESULT ITEMS ── */
    .result-item {
      margin-bottom: 1.75rem;
      max-width: 652px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    /* Left: all text */
    .result-text { flex: 1; min-width: 0; }

    /* Source line: favicon + site name + breadcrumb */
    .result-source {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 2px;
    }

    .result-favicon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #e8eaed;
      flex-shrink: 0;
      background: #f1f3f4;
    }

    .result-site {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .result-site-name {
      font-size: 0.85rem;
      color: #202124;
      font-weight: 400;
    }

    .result-breadcrumb {
      font-size: 0.75rem;
      color: #4d5156;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
    }

    .result-title {
      font-size: 1.15rem;
      color: #1a0dab;
      font-weight: 400;
      line-height: 1.3;
      margin: 3px 0 4px;
      text-decoration: none;
      display: block;
    }

    .result-title:hover { text-decoration: underline; }
    .result-title:visited { color: #609; }

    .result-snippet {
      font-size: 0.875rem;
      color: #4d5156;
      line-height: 1.58;
    }

    /* Right: image (only when available), centred against the card */
    .result-thumb-wrap { flex-shrink: 0; }

    .result-thumb {
      width: 86px;
      height: 86px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid #e8eaed;
    }

    .no-results {
      padding: 2rem 0;
      color: #70757a;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .results-body { margin-left: 1rem; padding-right: 1rem; }
      .knowledge-panel { flex-direction: column; }
      .knowledge-panel img { width: 100%; height: 180px; }
      .result-thumb { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <div class="top-nav">Hugh's Search</div>
  <div class="logo">
    <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
  </div>
  <form class="search-wrap" id="homeForm">
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="homeQuery" autocomplete="off" autofocus placeholder="Search Wikipedia…" />
    </div>
    <div class="search-buttons">
      <button type="submit">Zettair Search</button>
    </div>
  </form>
</div>

<!-- RESULTS PAGE -->
<div id="results-page">
  <div class="results-header">
    <div class="logo-small" id="logoBack">
      <span>Z</span><span>e</span><span>t</span><span>t</span><span>a</span><span>i</span><span>r</span>
    </div>
    <form class="results-search-box" id="resultsForm">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="resultsQuery" autocomplete="off" />
    </form>
  </div>

  <div class="results-body">
    <div class="results-meta" id="resultsMeta"></div>
    <div id="knowledgePanel"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const homePage        = document.getElementById('home');
  const resultsPage     = document.getElementById('results-page');
  const homeQuery       = document.getElementById('homeQuery');
  const resultsQuery    = document.getElementById('resultsQuery');
  const resultsMeta     = document.getElementById('resultsMeta');
  const resultsList     = document.getElementById('resultsList');
  const knowledgePanel  = document.getElementById('knowledgePanel');
  const resultsForm     = document.getElementById('resultsForm');
  const resultsSearchBox = resultsForm.closest ? resultsForm : resultsForm.parentElement;

  let debounceTimer = null;
  let currentController = null;

  // ── HOME: submit only ──
  document.getElementById('homeForm').addEventListener('submit', e => {
    e.preventDefault();
    const q = homeQuery.value.trim();
    if (q) doSearch(q);
  });

  // ── RESULTS: submit ──
  resultsForm.addEventListener('submit', e => {
    e.preventDefault();
    const q = resultsQuery.value.trim();
    if (q) doSearch(q);
  });

  // ── RESULTS: instant search (debounced, results page only) ──
  resultsQuery.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = resultsQuery.value.trim();
    if (!q) {
      resultsMeta.textContent = '';
      resultsList.innerHTML = '';
      knowledgePanel.innerHTML = '';
      return;
    }
    if (q.length < 2) return;
    debounceTimer = setTimeout(() => doSearch(q, true), 300);
  });

  // ── LOGO: back to home ──
  document.getElementById('logoBack').addEventListener('click', () => {
    resultsPage.style.display = 'none';
    homePage.style.display = 'flex';
    homeQuery.value = '';
    homeQuery.focus();
  });

  async function doSearch(q, isInstant = false) {
    // Cancel in-flight request
    if (currentController) currentController.abort();
    currentController = new AbortController();

    // Switch to results view
    homePage.style.display = 'none';
    resultsPage.style.display = 'block';
    resultsQuery.value = q;

    // Show loading state
    resultsForm.classList.add('loading');

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(q)}&n=25`, {
        signal: currentController.signal
      });
      const data = await res.json();

      resultsForm.classList.remove('loading');

      if (!data.results || data.results.length === 0) {
        resultsMeta.textContent = 'No results found.';
        resultsList.innerHTML = '';
        knowledgePanel.innerHTML = '';
        return;
      }

      resultsMeta.textContent = `About ${data.total.toLocaleString()} results (${data.took_ms} ms)`;

      // Knowledge panel — top result if it has an image
      const top = data.results[0];
      if (top.image_url) {
        const title = formatTitle(top.docno);
        const wikiUrl = `https://simple.wikipedia.org/wiki/${encodeURIComponent(top.docno)}`;
        knowledgePanel.innerHTML = `
          <div class="knowledge-panel">
            <img src="${escHtml(proxyImg(top.image_url))}" alt="${escHtml(title)}"
                 onerror="this.closest('.knowledge-panel').style.display='none'">
            <div class="knowledge-panel-text">
              <a href="${escHtml(wikiUrl)}" target="_blank" rel="noopener noreferrer">${escHtml(title)}</a>
              <p>${escHtml(top.snippet || '')}</p>
            </div>
          </div>`;
      } else {
        knowledgePanel.innerHTML = '';
      }

      // Result list
      resultsList.innerHTML = data.results.map((r, idx) => {
        const title = formatTitle(r.docno);
        const wikiUrl = `https://simple.wikipedia.org/wiki/${encodeURIComponent(r.docno)}`;
        const breadcrumb = `simple.wikipedia.org › wiki › ${r.docno.replace(/_/g,' ')}`;
        const thumbHtml = r.image_url
          ? `<div class="result-thumb-wrap">
               <img class="result-thumb" src="${escHtml(proxyImg(r.image_url))}" alt="${escHtml(title)}"
                 onerror="this.closest('.result-thumb-wrap').remove()">
             </div>`
          : '';
        return `
          <div class="result-item">
            <div class="result-text">
              <div class="result-source">
                <img class="result-favicon"
                  src="https://www.google.com/s2/favicons?domain=simple.wikipedia.org&sz=64"
                  alt="">
                <div class="result-site">
                  <span class="result-site-name">Wikipedia</span>
                  <span class="result-breadcrumb">${escHtml(breadcrumb)}</span>
                </div>
              </div>
              <a class="result-title" href="${escHtml(wikiUrl)}"
                 target="_blank" rel="noopener noreferrer">${escHtml(title)}</a>
              <div class="result-snippet">${escHtml(r.snippet || '')}</div>
            </div>
            ${thumbHtml}
          </div>`;
      }).join('');

    } catch (err) {
      if (err.name === 'AbortError') return; // cancelled — ignore
      resultsForm.classList.remove('loading');
      resultsMeta.textContent = '';
      resultsList.innerHTML = `<div class="no-results">Something went wrong: ${escHtml(err.message)}</div>`;
    }
  }

  function proxyImg(url) {
    return url ? `/img?url=${encodeURIComponent(url)}` : null;
  }

  function formatTitle(docno) {
    return (docno || '').replace(/_/g, ' ').replace(/\s*\(.*?\)\s*$/, '').trim();
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
