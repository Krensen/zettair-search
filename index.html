<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zettair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
    }

    /* ── HOMEPAGE ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    #home .top-nav {
      align-self: flex-end;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: #202124;
    }

    #home .logo {
      margin-top: 15vh;
      margin-bottom: 0.5rem;
      font-size: 4.5rem;
      font-weight: 400;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      letter-spacing: -2px;
      color: #202124;
    }

    /* Paul Smith signature stripe — under home logo only */
    #home .logo-stripe {
      display: flex;
      width: 340px;
      height: 4px;
      margin-bottom: 1.75rem;
      border-radius: 2px;
      overflow: hidden;
    }
    #home .logo-stripe span { flex: 1; }
    #home .logo-stripe span:nth-child(1) { background: #e8222a; }
    #home .logo-stripe span:nth-child(2) { background: #f26522; }
    #home .logo-stripe span:nth-child(3) { background: #f9a825; }
    #home .logo-stripe span:nth-child(4) { background: #8bc34a; }
    #home .logo-stripe span:nth-child(5) { background: #26c6da; }
    #home .logo-stripe span:nth-child(6) { background: #1565c0; }
    #home .logo-stripe span:nth-child(7) { background: #6a1b9a; }

    .search-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 584px;
      padding: 0 1rem;
    }

    .search-box {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.65rem 1.1rem;
      gap: 0.6rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .search-box svg { flex-shrink: 0; color: #9aa0a6; }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .search-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .search-buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 0.875rem;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
    }

    .search-buttons button:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* PRD-020: trending chip rail under the homepage search box.
       Hidden until /api/trending returns; if the response is empty
       (e.g. trending.json not yet written) the rail stays hidden. */
    @keyframes rail-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes chip-in {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .trending-rail {
      display: none;
      max-width: 680px;
      margin: 1.75rem auto 0;
      padding: 0 1rem;
    }
    .trending-rail.ready {
      display: block;
      animation: rail-in 480ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    /* Label + chips share one row on wide screens, stack on narrow. */
    .trending-rail-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.45rem 0.55rem;
    }

    .trending-rail-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a73e8;
      padding: 4px 10px 4px 8px;
      background: #e8f0fe;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .trending-rail-label svg {
      width: 12px; height: 12px;
      stroke: #1a73e8;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .trending-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px 6px 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      color: #202124;
      font-size: 0.84rem;
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(60,64,67,0.04);
      transition: background 160ms ease, border-color 160ms ease,
                  transform 160ms ease, box-shadow 160ms ease;
      animation: chip-in 360ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    /* Stagger so each chip slides in slightly after the previous one. */
    .trending-chip:nth-child(1) { animation-delay: 120ms; }
    .trending-chip:nth-child(2) { animation-delay: 180ms; }
    .trending-chip:nth-child(3) { animation-delay: 240ms; }
    .trending-chip:nth-child(4) { animation-delay: 300ms; }
    .trending-chip:nth-child(5) { animation-delay: 360ms; }
    .trending-chip:nth-child(6) { animation-delay: 420ms; }
    .trending-chip:nth-child(7) { animation-delay: 480ms; }
    .trending-chip:nth-child(8) { animation-delay: 540ms; }

    .trending-chip:hover {
      background: #f8fafc;
      border-color: #c0c4c9;
      box-shadow: 0 2px 6px rgba(60,64,67,0.10);
      transform: translateY(-1px);
    }
    .trending-chip:active {
      transform: translateY(0) scale(0.98);
    }
    .trending-chip svg {
      width: 12px; height: 12px;
      stroke: #1a73e8;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    /* External-link variant: article not in our index — chip goes to
       en.wikipedia.org. Muted styling + grey icon so visually
       distinguishable from the search-query chips at a glance. */
    .trending-chip.external {
      background: #fafbfc;
      color: #5f6368;
    }
    .trending-chip.external:hover {
      background: #f1f3f4;
      border-color: #c0c4c9;
    }
    .trending-chip.external svg {
      stroke: #80868b;
    }
    /* Reduced motion users get the same content, no cascade. */
    @media (prefers-reduced-motion: reduce) {
      .trending-rail.ready,
      .trending-chip {
        animation: none !important;
      }
    }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      gap: 1.5rem;
      border-bottom: 1px solid #ebebeb;
      flex-wrap: wrap;
    }

    .logo-small-wrap {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      cursor: pointer;
    }

    .logo-small {
      font-size: 1.75rem;
      font-weight: 400;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      letter-spacing: -0.5px;
      color: #202124;
      text-decoration: none;
      line-height: 1;
    }

    /* Tiny stripe under the small logo on results page */
    .logo-small-stripe {
      display: flex;
      height: 3px;
      margin-top: 3px;
      border-radius: 2px;
      overflow: hidden;
    }
    .logo-small-stripe span { flex: 1; }
    .logo-small-stripe span:nth-child(1) { background: #e8222a; }
    .logo-small-stripe span:nth-child(2) { background: #f26522; }
    .logo-small-stripe span:nth-child(3) { background: #f9a825; }
    .logo-small-stripe span:nth-child(4) { background: #8bc34a; }
    .logo-small-stripe span:nth-child(5) { background: #26c6da; }
    .logo-small-stripe span:nth-child(6) { background: #1565c0; }
    .logo-small-stripe span:nth-child(7) { background: #6a1b9a; }

    .results-search-box {
      flex: 1;
      max-width: 584px;
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0.55rem 1.1rem;
      gap: 0.6rem;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .results-search-box:hover, .results-search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .results-search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .results-search-box .search-icon {
      flex-shrink: 0;
      color: #9aa0a6;
      transition: color 0.2s;
    }
    .results-search-box.loading .search-icon {
      color: #4285f4;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    .results-body {
      max-width: 700px;
      margin: 0 0 0 calc(max(1.5rem, 50vw - 490px));
      padding: 0.5rem 1rem 3rem;
    }

    .results-meta {
      font-size: 0.8rem;
      color: #70757a;
      padding: 0.6rem 0 1.25rem;
      min-height: 2.2rem;
    }

    /* ── KNOWLEDGE PANEL ── */
    .knowledge-panel {
      display: flex;
      gap: 1.25rem;
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.75rem;
      max-width: 620px;
      align-items: flex-start;
    }

    .knowledge-panel img {
      width: 112px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .knowledge-panel-text { flex: 1; min-width: 0; }

    .knowledge-panel-text .kp-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #202124;
      margin-bottom: 2px;
      display: block;
      text-decoration: none;
    }

    .knowledge-panel-text .kp-title:hover { text-decoration: underline; }

    .knowledge-panel-text .kp-source {
      font-size: 0.75rem;
      color: #70757a;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .knowledge-panel-text .kp-source img {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: none;
      flex-shrink: 0;
    }

    .knowledge-panel-text p {
      font-size: 0.875rem;
      color: #4d5156;
      line-height: 1.6;
    }

    /* PRD-018: knowledge-panel summary styling. The summary appears
       after the result list paints. Skeleton lines shimmer left-to-right
       while loading, then the real content slides up + fades in with a
       staggered line-by-line reveal — feels like the answer is being
       composed rather than dropped in. */

    /* Bigger slide distance (16px), longer + cubic-bezier easing so the
       motion has personality. Filter blur smooths the entrance. */
    @keyframes kp-summary-in {
      0%   { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      60%  { opacity: 1;                              filter: blur(0); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    /* Shorter, snappier slide for each child element so individual
       paragraphs/bullets cascade in. */
    @keyframes kp-line-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Wider shimmer travel + faster sweep makes the loading state feel
       visibly busy. */
    @keyframes kp-shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    /* Skeleton lines come in staggered too so it doesn't feel like a
       static block. */
    @keyframes kp-skeleton-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    /* Pulse for the dot in the SUMMARY badge — independent rhythm
       from the shimmer so the badge keeps the "alive" feel after the
       summary has loaded. */
    @keyframes kp-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.3); }
    }

    /* The panel itself gets an accent border on the left when a summary
       is present, distinguishing it from the plain-top-result variant. */
    .knowledge-panel.has-summary {
      border-left: 3px solid #1a73e8;
      box-shadow: 0 1px 3px rgba(60,64,67,0.08), 0 4px 14px rgba(60,64,67,0.08);
    }

    .kp-summary-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1a73e8;
      background: #e8f0fe;
      padding: 3px 10px 3px 9px;
      border-radius: 999px;
      margin-bottom: 0.6rem;
    }
    .kp-summary-badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a73e8;
      animation: kp-pulse 1.4s ease-in-out infinite;
    }
    /* PRD-021: news-summary variant — distinct accent so users can
       tell at a glance "this is current news, not biography". */
    .kp-summary-badge.news {
      color: #b35900;
      background: #fff4e5;
    }
    .kp-summary-badge.news::before {
      background: #e8222a;
    }
    /* Inline date stamp inside the "In the news" badge — sits to
       the right of the badge text in a slightly muted, lower-weight
       style so the date reads as a meta-detail, not part of the
       badge label. */
    .kp-event-date {
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: #b35900;
      opacity: 0.75;
      margin-left: 8px;
      padding-left: 8px;
      border-left: 1px solid rgba(179, 89, 0, 0.25);
    }

    .kp-summary {
      font-size: 0.9rem;
      color: #202124;
      line-height: 1.55;
      animation: kp-summary-in 700ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    /* Stagger child elements: each direct child slides in slightly after
       the previous one. Caps at 6 so a long list doesn't drag forever. */
    .kp-summary > * {
      animation: kp-line-in 420ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .kp-summary > *:nth-child(1) { animation-delay: 80ms; }
    .kp-summary > *:nth-child(2) { animation-delay: 180ms; }
    .kp-summary > *:nth-child(3) { animation-delay: 280ms; }
    .kp-summary > *:nth-child(4) { animation-delay: 380ms; }
    .kp-summary > *:nth-child(5) { animation-delay: 460ms; }
    .kp-summary > *:nth-child(n+6) { animation-delay: 540ms; }
    /* Bullet items inside <ul> get their own staircase */
    .kp-summary ul li {
      animation: kp-line-in 360ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .kp-summary ul li:nth-child(1) { animation-delay: 320ms; }
    .kp-summary ul li:nth-child(2) { animation-delay: 420ms; }
    .kp-summary ul li:nth-child(3) { animation-delay: 520ms; }
    .kp-summary ul li:nth-child(4) { animation-delay: 620ms; }
    .kp-summary ul li:nth-child(5) { animation-delay: 720ms; }
    .kp-summary ul li:nth-child(n+6) { animation-delay: 820ms; }

    .kp-summary p { margin: 0 0 0.5rem; color: inherit; font-size: inherit; }
    .kp-summary p:last-child { margin-bottom: 0; }
    .kp-summary ul {
      margin: 0.4rem 0 0.5rem;
      padding-left: 1.2rem;
    }
    .kp-summary li { margin: 0.15rem 0; }
    .kp-summary strong { color: #202124; font-weight: 600; }

    /* Collapsed summary: clip to ~3 lines and add a soft fade so users
       see there's more. The .kp-summary itself is positioned so its
       ::after gradient sits at the bottom of the clipped content. */
    .kp-summary-wrap { position: relative; }
    .kp-summary { position: relative; }
    .kp-summary-wrap.collapsed .kp-summary {
      max-height: 9.3em;          /* ~6 lines at 1.55 line-height */
      overflow: hidden;
    }
    .kp-summary-wrap.collapsed .kp-summary::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 2.2em;
      background: linear-gradient(to bottom, rgba(248,249,250,0), #f8f9fa 95%);
      pointer-events: none;
    }
    /* Smooth expand: max-height transition. Expanded state uses a
       generous ceiling so any length fits. */
    .kp-summary {
      transition: max-height 320ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .kp-summary-wrap:not(.collapsed) .kp-summary {
      max-height: 200em;
    }

    /* "Show more" / "Show less" chevron pill. Sits below the summary,
       full-width-ish so the affordance is clear without dominating. */
    .kp-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.5rem;
      padding: 4px 12px 4px 14px;
      background: transparent;
      border: 1px solid #dadce0;
      border-radius: 999px;
      color: #1a73e8;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .kp-toggle:hover {
      background: #f1f3f4;
      border-color: #c0c4c9;
    }
    .kp-toggle:focus-visible {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }
    .kp-toggle svg {
      width: 14px; height: 14px;
      transition: transform 240ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .kp-summary-wrap:not(.collapsed) .kp-toggle svg {
      transform: rotate(180deg);
    }

    /* Skeleton placeholder shown while the summary loads in. Four
       fake lines that shimmer left-to-right and cascade in from the
       left so the loading state is visibly animated, not just flashing. */
    .kp-skeleton {
      animation: kp-summary-in 240ms ease-out both;
    }
    .kp-skeleton .line {
      height: 0.7rem;
      margin: 0.55rem 0;
      border-radius: 4px;
      background-image: linear-gradient(
        90deg,
        #eef0f3 0%,
        #ffffff 35%,
        #dee3eb 50%,
        #ffffff 65%,
        #eef0f3 100%
      );
      background-size: 1200px 100%;
      animation: kp-shimmer 1.1s linear infinite,
                 kp-skeleton-in 320ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .kp-skeleton .line:nth-child(1) { animation-delay: 0ms,    60ms; }
    .kp-skeleton .line:nth-child(2) { animation-delay: 100ms, 140ms; }
    .kp-skeleton .line:nth-child(3) { animation-delay: 200ms, 220ms; }
    .kp-skeleton .line:nth-child(4) { animation-delay: 300ms, 300ms; }
    .kp-skeleton .line.w80 { width: 80%; }
    .kp-skeleton .line.w95 { width: 95%; }
    .kp-skeleton .line.w65 { width: 65%; }
    .kp-skeleton .line.w40 { width: 40%; }

    /* Respect users who prefer reduced motion — collapse to fast fades only. */
    @media (prefers-reduced-motion: reduce) {
      .kp-summary,
      .kp-summary > *,
      .kp-summary ul li,
      .kp-skeleton,
      .kp-skeleton .line,
      .kp-summary-badge::before {
        animation-duration: 200ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
        transform: none !important;
        filter: none !important;
      }
    }

    /* ── RESULT ITEMS ── */
    .result-item {
      margin-bottom: 2rem;
      max-width: 620px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .result-text { flex: 1; min-width: 0; }

    /* Source line: favicon + site name + breadcrumb path */
    .result-source {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .result-favicon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #e8eaed;
      flex-shrink: 0;
      background: #f1f3f4;
    }

    .result-site {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      min-width: 0;
    }

    .result-site-name {
      font-size: 0.875rem;
      color: #202124;
    }

    .result-breadcrumb {
      font-size: 0.78rem;
      color: #4d5156;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 460px;
    }

    .result-title {
      font-size: 1.2rem;
      color: #1a0dab;
      font-weight: 400;
      line-height: 1.3;
      margin: 4px 0 5px;
      text-decoration: none;
      display: block;
    }

    .result-title:hover { text-decoration: underline; }
    .result-title:visited { color: #609; }

    /* Cite trigger embedded in the source/breadcrumb line — placed
       to the right of "Wikipedia · en.wikipedia.org" with a small
       gap so it reads as a peer action, not crammed against the
       breadcrumb. */
    .result-source .cite-trigger,
    .kp-source .cite-trigger {
      margin-left: auto;   /* push to the right edge of the flex row */
    }

    .result-snippet {
      font-size: 0.9rem;
      color: #4d5156;
      line-height: 1.6;
    }

    /* Thumbnail — right-aligned, centred on the card */
    .result-thumb-wrap { flex-shrink: 0; }

    .result-thumb {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid #e8eaed;
    }

    .no-results {
      padding: 2rem 0;
      color: #70757a;
      font-size: 0.95rem;
    }

    /* ── PRD-024: CITE THIS ── */
    /* The trigger lives in a flex .title-row alongside the result
       title (or kp-title), anchored to the title's right edge so its
       position doesn't shift when a thumbnail is present. Variant H
       styling: tinted pill, blue text on light-blue background. */
    .title-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .title-row .result-title,
    .title-row .kp-title {
      margin: 0;            /* the row itself owns the spacing */
    }
    .cite-trigger {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 10px 0 8px;
      background: #f1f3f4;       /* neutral grey, was tinted blue */
      border: 1px solid transparent;
      border-radius: 11px;
      color: #5f6368;            /* secondary-text grey, was strong blue */
      font: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }
    .cite-trigger:hover {
      background: #e8f0fe;       /* hint of blue tint only on hover */
      color: #1a73e8;
    }
    .cite-trigger:focus-visible {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }
    .cite-trigger svg {
      width: 11px;
      height: 11px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cite-popover {
      position: absolute;
      z-index: 1000;
      width: 480px;
      max-width: calc(100vw - 2rem);
      max-height: 70vh;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(60,64,67,0.15);
      padding: 0;
      opacity: 0;
      transform: translateY(-4px);
      animation: cite-pop-in 180ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }
    @keyframes cite-pop-in {
      to { opacity: 1; transform: translateY(0); }
    }
    .cite-popover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.85rem 0.65rem;
      border-bottom: 1px solid #ebebeb;
    }
    .cite-popover-header strong {
      font-weight: 600;
      font-size: 0.85rem;
      color: #202124;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 380px;
    }
    .cite-popover-close {
      background: transparent;
      border: none;
      color: #5f6368;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 50%;
    }
    .cite-popover-close:hover { background: #f1f3f4; color: #202124; }
    .cite-row {
      padding: 0.55rem 0.85rem;
      border-bottom: 1px solid #f5f5f5;
    }
    .cite-row:last-child { border-bottom: none; }
    .cite-row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.3rem;
    }
    .cite-style-name {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1a73e8;
    }
    .cite-copy {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid #dadce0;
      border-radius: 999px;
      color: #1a73e8;
      font: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }
    .cite-copy:hover {
      background: #f1f3f4;
      border-color: #c0c4c9;
    }
    .cite-copy.copied {
      background: #e6f4ea;
      color: #137333;
      border-color: #a6d4ad;
    }
    .cite-text {
      font-size: 0.78rem;
      color: #3c4043;
      line-height: 1.5;
      word-wrap: break-word;
      user-select: text;
      font-family: inherit;
    }
    .cite-text.bibtex {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.72rem;
      white-space: pre-wrap;
      background: #fafbfc;
      padding: 0.55rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #ebebeb;
    }
    @media (prefers-reduced-motion: reduce) {
      .cite-popover { animation: none; opacity: 1; transform: none; }
    }
    /* Mobile: bottom-sheet variant. */
    @media (max-width: 640px) {
      .cite-popover {
        position: fixed;
        bottom: 0; left: 0; right: 0; top: auto;
        width: 100%;
        max-width: 100%;
        max-height: 80vh;
        border-radius: 16px 16px 0 0;
        animation: cite-sheet-in 220ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
        transform: translateY(100%);
      }
      @keyframes cite-sheet-in {
        to { transform: translateY(0); opacity: 1; }
      }
    }

    @media (max-width: 640px) {
      .results-body { margin-left: 1rem; padding-right: 1rem; }
      .knowledge-panel { flex-direction: column; }
      .knowledge-panel img { width: 100%; height: 200px; }
      .result-thumb { width: 68px; height: 68px; }
    }

    /* ── AUTOSUGGEST DROPDOWN ── */
    .suggest-wrap {
      position: relative;
      width: 100%;
    }

    .suggest-dropdown {
      display: none;
      position: absolute;
      top: calc(100% - 1px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid rgba(223,225,229,0);
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(32,33,36,0.28);
      z-index: 100;
      overflow: hidden;
    }

    .suggest-dropdown.open { display: block; }

    /* When dropdown is open, square the bottom of the search box */
    .search-box.suggest-open,
    .results-search-box.suggest-open {
      border-radius: 24px 24px 0 0;
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
      border-color: rgba(223,225,229,0);
    }

    .suggest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggest-item:hover,
    .suggest-item.active {
      background: #f8f9fa;
    }

    .suggest-item svg { flex-shrink: 0; color: #9aa0a6; }

    .suggest-item .suggest-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    .suggest-item .suggest-match { font-weight: 700; }

    .suggest-divider {
      height: 1px;
      background: #e8eaed;
      margin: 0 16px;
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <div class="top-nav">Hugh's Search</div>
  <div class="logo">Zettair</div>
  <div class="logo-stripe">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <form class="search-wrap" id="homeForm">
    <div class="suggest-wrap">
      <div class="search-box" id="homeSearchBox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="homeQuery" autocomplete="off" autofocus placeholder="Search Wikipedia…" />
      </div>
      <div class="suggest-dropdown" id="homeSuggest"></div>
    </div>
    <div class="search-buttons">
      <button type="submit">Zettair Search</button>
    </div>
  </form>
  <div class="trending-rail" id="trendingRail" aria-label="Trending searches"></div>
</div>

<!-- RESULTS PAGE -->
<div id="results-page">
  <div class="results-header">
    <div class="logo-small-wrap" id="logoBack">
      <div class="logo-small">Zettair</div>
      <div class="logo-small-stripe">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="suggest-wrap" style="flex:1;max-width:584px;">
      <form class="results-search-box" id="resultsForm">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="resultsQuery" autocomplete="off" />
      </form>
      <div class="suggest-dropdown" id="resultsSuggest"></div>
    </div>
  </div>

  <div class="results-body">
    <div class="results-meta" id="resultsMeta"></div>
    <div id="knowledgePanel"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const homePage       = document.getElementById('home');
  const resultsPage    = document.getElementById('results-page');
  const homeQuery      = document.getElementById('homeQuery');
  const resultsQuery   = document.getElementById('resultsQuery');
  const resultsMeta    = document.getElementById('resultsMeta');
  const resultsList    = document.getElementById('resultsList');
  const knowledgePanel = document.getElementById('knowledgePanel');
  const resultsForm    = document.getElementById('resultsForm');

  let debounceTimer = null;
  let currentController = null;

  document.getElementById('homeForm').addEventListener('submit', e => {
    e.preventDefault();
    const q = homeQuery.value.trim();
    if (q) doSearch(q);
  });

  resultsForm.addEventListener('submit', e => {
    e.preventDefault();
    const q = resultsQuery.value.trim();
    if (q) doSearch(q);
  });

  // Instant search disabled — uncomment to re-enable
  // resultsQuery.addEventListener('input', () => {
  //   clearTimeout(debounceTimer);
  //   const q = resultsQuery.value.trim();
  //   if (!q) { resultsMeta.textContent = ''; resultsList.innerHTML = ''; knowledgePanel.innerHTML = ''; return; }
  //   if (q.length < 2) return;
  //   debounceTimer = setTimeout(() => doSearch(q, true), 300);
  // });

  document.getElementById('logoBack').addEventListener('click', (e) => {
    showHome();
    history.pushState({page: 'home'}, '', '/');
  });

  function showHome() {
    resultsPage.style.display = 'none';
    homePage.style.display = 'flex';
    homeQuery.value = '';
    homeQuery.focus();
  }

  // Browser back/forward: restore the state encoded in the URL.
  // ?q=foo  -> results for foo;  no q     -> home page.
  window.addEventListener('popstate', () => {
    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    if (q) {
      doSearch(q, /*fromHistory=*/ true);
    } else {
      showHome();
    }
  });

  async function doSearch(q, fromHistory = false) {
    if (currentController) currentController.abort();
    currentController = new AbortController();

    // Update the URL so the search is bookmarkable and back/forward-able.
    // Skip when we're invoked FROM a popstate — pushing again would loop.
    if (!fromHistory) {
      const desired = '/?q=' + encodeURIComponent(q);
      if (location.pathname + location.search !== desired) {
        history.pushState({page: 'results', q}, '', desired);
      }
    }

    homePage.style.display = 'none';
    resultsPage.style.display = 'block';
    resultsQuery.value = q;
    resultsForm.classList.add('loading');

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(q)}&n=25`, { signal: currentController.signal });
      const data = await res.json();
      resultsForm.classList.remove('loading');

      if (!data.results || data.results.length === 0) {
        resultsMeta.textContent = 'No results found.';
        resultsList.innerHTML = '';
        knowledgePanel.innerHTML = '';
        return;
      }

      resultsMeta.textContent = `About ${data.total.toLocaleString()} results (${data.took_ms} ms)`;

      // Knowledge panel — top result, with image when one is available.
      // If the image fails to load, hide just the <img> rather than the whole
      // panel: the text content is still useful even without a picture.
      // When PRD-018 provides a generated summary for this query, render a
      // shimmer skeleton first and fade the real summary in after the
      // results have had a moment to paint — gives the page a Google-like
      // "answer is composing" feel.
      const top = data.results[0];
      const title = formatTitle(top.docno);
      const wikiUrl = wikiLink(top);
      const imgHtml = top.image_url
        ? `<img src="${esc(proxyImg(top.image_url))}" alt="${esc(title)}"
                onerror="this.style.display='none'">`
        : '';
      const hasSummary = typeof data.summary === 'string' && data.summary.trim().length > 0;
      // PRD-021: news summaries get a different "In the news" badge
      // (vs the standard "Summary" badge) and an as-of dated stamp.
      const isNewsSummary = data.summary_kind === 'news';
      const badgeText  = isNewsSummary ? 'In the news' : 'Summary';
      const badgeClass = isNewsSummary ? 'kp-summary-badge news' : 'kp-summary-badge';
      // Inline date as part of the badge content; "as of …" sits to
      // the right of the badge text, separated by a thin rule.
      const badgeInner = isNewsSummary && data.event_date
        ? `${badgeText}<span class="kp-event-date">as of ${esc(data.event_date)}</span>`
        : badgeText;
      const skeletonHtml = `
        <div class="${badgeClass}">${badgeInner}</div>
        <div class="kp-skeleton" id="kpSkeleton" aria-busy="true" aria-label="Generating summary">
          <div class="line w95"></div>
          <div class="line w95"></div>
          <div class="line w80"></div>
          <div class="line w65"></div>
          <div class="line w40"></div>
        </div>`;
      const initialBody = hasSummary
        ? skeletonHtml
        : `<p>${highlightQuery(top.snippet || '', q)}</p>`;
      knowledgePanel.innerHTML = `
        <div class="knowledge-panel${hasSummary ? ' has-summary' : ''}">
          ${imgHtml}
          <div class="knowledge-panel-text">
            <div class="title-row">
              <a class="kp-title" href="${esc(wikiUrl)}" target="_blank" rel="noopener noreferrer"
                 onclick="logClick(${JSON.stringify(q)}, ${JSON.stringify(top.docno)}, 1, ${top.score})"
              >${esc(title)}</a>
              <button class="cite-trigger" type="button"
                 data-title="${esc(title)}" data-url="${esc(wikiUrl)}" data-docno="${esc(top.docno)}"
                 aria-label="Cite this article">${CITE_ICON_SVG}<span>Cite</span></button>
            </div>
            <div class="kp-source">
              <img src="https://www.google.com/s2/favicons?domain=en.wikipedia.org&sz=32" alt="">
              <span>Wikipedia · en.wikipedia.org</span>
            </div>
            <div id="kpBody">${initialBody}</div>
          </div>
        </div>`;

      // Replace skeleton with the rendered summary AFTER the result list has
      // had a chance to paint. requestAnimationFrame + a short timeout makes
      // the load feel deliberate rather than instant. Use the most recent
      // summary captured at this call time, so a fast-following second
      // search doesn't show the wrong content.
      if (hasSummary) {
        const renderedSummary = renderMarkdown(data.summary);
        const bodyEl = document.getElementById('kpBody');
        const queryAtRequestTime = q;
        // Hold the skeleton long enough for the shimmer to make a couple
        // of passes — feels more like an answer is being composed.
        // double rAF so we wait for at least one full paint
        requestAnimationFrame(() => requestAnimationFrame(() => {
          setTimeout(() => {
            // bail if the user fired another search in the meantime
            if (resultsQuery.value !== queryAtRequestTime) return;
            if (!bodyEl || !bodyEl.isConnected) return;
            // Summary renders collapsed by default; user expands via the
            // chevron toggle. Chevron rotates 180° when expanded; the
            // .collapsed class on the wrapper drives clip + fade.
            const chevron = '<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">' +
              '<path d="M5.5 7.5L10 12l4.5-4.5" stroke="currentColor" stroke-width="2" ' +
              'stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
            bodyEl.innerHTML =
              '<div class="' + badgeClass + '">' + badgeInner + '</div>' +
              '<div class="kp-summary-wrap collapsed" id="kpSummaryWrap">' +
                '<div class="kp-summary">' + renderedSummary + '</div>' +
                '<button class="kp-toggle" type="button" id="kpToggle" ' +
                  'aria-expanded="false" aria-controls="kpSummaryWrap">' +
                  '<span class="kp-toggle-label">Show more</span>' + chevron +
                '</button>' +
              '</div>';
            const wrap = document.getElementById('kpSummaryWrap');
            const btn = document.getElementById('kpToggle');
            if (wrap && btn) {
              btn.addEventListener('click', () => {
                const collapsed = wrap.classList.toggle('collapsed');
                btn.setAttribute('aria-expanded', String(!collapsed));
                const lbl = btn.querySelector('.kp-toggle-label');
                if (lbl) lbl.textContent = collapsed ? 'Show more' : 'Show less';
              });
            }
          }, 900);
        }));
      }

      // Results
      resultsList.innerHTML = data.results.map(r => {
        const title = formatTitle(r.docno);
        const url = wikiLink(r);
        const crumb = `en.wikipedia.org › wiki › ${r.docno.replace(/_/g, ' ')}`;
        const thumb = r.image_url
          ? `<div class="result-thumb-wrap">
               <img class="result-thumb" src="${esc(proxyImg(r.image_url))}" alt="${esc(title)}"
                 onerror="this.closest('.result-thumb-wrap').remove()">
             </div>`
          : '';
        return `
          <div class="result-item">
            <div class="result-text">
              <div class="result-source">
                <img class="result-favicon"
                  src="https://www.google.com/s2/favicons?domain=en.wikipedia.org&sz=64" alt="">
                <div class="result-site">
                  <span class="result-site-name">Wikipedia</span>
                  <span class="result-breadcrumb">${esc(crumb)}</span>
                </div>
              </div>
              <div class="title-row">
                <a class="result-title" href="${esc(url)}" target="_blank" rel="noopener noreferrer"
                   onclick="logClick(${JSON.stringify(q)}, ${JSON.stringify(r.docno)}, ${r.rank}, ${r.score})"
                >${esc(title)}</a>
                <button class="cite-trigger" type="button"
                  data-title="${esc(title)}" data-url="${esc(url)}" data-docno="${esc(r.docno)}"
                  aria-label="Cite this result">${CITE_ICON_SVG}<span>Cite</span></button>
              </div>
              <div class="result-snippet">${highlightQuery(r.snippet || '', q)}</div>
            </div>
            ${thumb}
          </div>`;
      }).join('');

    } catch (err) {
      if (err.name === 'AbortError') return;
      resultsForm.classList.remove('loading');
      resultsList.innerHTML = `<div class="no-results">Something went wrong: ${esc(err.message)}</div>`;
    }
  }

  // ── AUTOSUGGEST ──
  function setupSuggest(inputEl, dropdownEl, searchBoxEl) {
    let suggestTimer = null;
    let suggestController = null;
    let activeIdx = -1;
    let currentSuggestions = [];

    function closeSuggest() {
      dropdownEl.classList.remove('open');
      searchBoxEl.classList.remove('suggest-open');
      activeIdx = -1;
      currentSuggestions = [];
    }

    function renderSuggestions(suggestions, prefix) {
      if (!suggestions.length) { closeSuggest(); return; }
      currentSuggestions = suggestions;
      activeIdx = -1;

      dropdownEl.innerHTML = suggestions.map((s, i) => {
        // Bold the matching prefix
        const q = s.query;
        const boldPart = q.slice(0, prefix.length);
        const rest = q.slice(prefix.length);
        return `<div class="suggest-item" data-idx="${i}" data-query="${esc(q)}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="suggest-text"><span class="suggest-match">${esc(boldPart)}</span>${esc(rest)}</span>
        </div>`;
      }).join('');

      // Click on suggestion
      dropdownEl.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault(); // don't blur the input
          const q = el.dataset.query;
          inputEl.value = q;
          closeSuggest();
          doSearch(q);
        });
      });

      dropdownEl.classList.add('open');
      searchBoxEl.classList.add('suggest-open');
    }

    async function fetchSuggestions(prefix) {
      if (suggestController) suggestController.abort();
      suggestController = new AbortController();
      try {
        const res = await fetch(`/suggest?q=${encodeURIComponent(prefix)}&n=8`, {
          signal: suggestController.signal
        });
        const data = await res.json();
        renderSuggestions(data.suggestions || [], prefix);
      } catch(e) {
        if (e.name !== 'AbortError') closeSuggest();
      }
    }

    inputEl.addEventListener('input', () => {
      clearTimeout(suggestTimer);
      const val = inputEl.value.trim();
      if (val.length < 2) { closeSuggest(); return; }
      suggestTimer = setTimeout(() => fetchSuggestions(val.toLowerCase()), 150);
    });

    inputEl.addEventListener('keydown', e => {
      if (!dropdownEl.classList.contains('open')) return;
      const items = dropdownEl.querySelectorAll('.suggest-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, -1);
      } else if (e.key === 'Escape') {
        closeSuggest(); return;
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        const q = currentSuggestions[activeIdx].query;
        inputEl.value = q;
        closeSuggest();
        doSearch(q);
        return;
      } else {
        return;
      }
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      if (activeIdx >= 0) inputEl.value = currentSuggestions[activeIdx].query;
    });

    inputEl.addEventListener('blur', () => {
      // Small delay so mousedown on suggestion fires first
      setTimeout(closeSuggest, 150);
    });
  }

  // Wire up both search boxes
  setupSuggest(
    document.getElementById('homeQuery'),
    document.getElementById('homeSuggest'),
    document.getElementById('homeSearchBox')
  );
  setupSuggest(
    document.getElementById('resultsQuery'),
    document.getElementById('resultsSuggest'),
    document.getElementById('resultsForm')
  );

  // Initial-load: if the URL has ?q=foo, run that search immediately so
  // permalinks and shared URLs work (and the browser back/forward buttons
  // can navigate between searches).
  (function bootstrapFromUrl() {
    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    if (q) {
      history.replaceState({page: 'results', q}, '', location.href);
      doSearch(q, /*fromHistory=*/ true);
    } else {
      history.replaceState({page: 'home'}, '', location.href);
    }
  })();

  // PRD-020: trending chip rail. Fetches /api/trending after the page
  // settles. Hidden by default; reveals only if the endpoint returns
  // non-empty items. Click → ?q=<query> via doSearch (which pushState's).
  (function loadTrending() {
    const rail = document.getElementById('trendingRail');
    if (!rail) return;
    // Inline SVGs — kept here rather than in the HTML so the rail can
    // stay an empty container until data lands.
    // Trending-up arrow for the label and for in-index chips.
    const TREND_ICON = '<svg viewBox="0 0 20 20" aria-hidden="true">' +
      '<polyline points="3,14 8,9 11,12 17,5"/>' +
      '<polyline points="12,5 17,5 17,10"/></svg>';
    // Spark/star for the "Popular" (raw-mode) label.
    const SPARK_ICON = '<svg viewBox="0 0 20 20" aria-hidden="true">' +
      '<path d="M10 3 L11.5 8 L17 9 L13 12.5 L14 18 L10 15 L6 18 L7 12.5 L3 9 L8.5 8 Z"/></svg>';
    // External-link arrow for chips whose article isn't in our index —
    // these go to en.wikipedia.org so the user still finds the page.
    const EXTERNAL_ICON = '<svg viewBox="0 0 20 20" aria-hidden="true">' +
      '<polyline points="11,4 16,4 16,9"/>' +
      '<line x1="16" y1="4" x2="9" y2="11"/>' +
      '<path d="M14 12 L14 15 Q14 16 13 16 L5 16 Q4 16 4 15 L4 7 Q4 6 5 6 L8 6"/></svg>';
    const start = () => {
      fetch('/api/trending?n=8')
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data || !Array.isArray(data.items) || data.items.length === 0) return;
          const isSpike = data.mode === 'spike';
          const labelText = isSpike ? 'Trending' : 'Popular';
          const labelIcon = isSpike ? TREND_ICON : SPARK_ICON;
          const inner = document.createElement('div');
          inner.className = 'trending-rail-inner';
          const lbl = document.createElement('div');
          lbl.className = 'trending-rail-label';
          lbl.innerHTML = labelIcon + '<span>' + labelText + '</span>';
          inner.appendChild(lbl);
          data.items.forEach(it => {
            const a = document.createElement('a');
            const inIndex = it.in_index !== false;   // default true if older payload
            a.className = 'trending-chip' + (inIndex ? '' : ' external');
            a.innerHTML = (inIndex ? TREND_ICON : EXTERNAL_ICON) + '<span></span>';
            a.querySelector('span').textContent = it.title;
            if (inIndex) {
              a.href = '/?q=' + encodeURIComponent(it.query);
              a.addEventListener('click', e => {
                e.preventDefault();
                doSearch(it.query);
              });
            } else {
              a.href = it.wiki_url || ('https://en.wikipedia.org/wiki/' + encodeURIComponent(it.title.replace(/ /g, '_')));
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
            }
            inner.appendChild(a);
          });
          rail.innerHTML = '';
          rail.appendChild(inner);
          rail.classList.add('ready');
        })
        .catch(() => { /* silent — rail stays hidden */ });
    };
    if ('requestIdleCallback' in window) {
      requestIdleCallback(start, {timeout: 800});
    } else {
      setTimeout(start, 200);
    }
  })();

  function logClick(q, docno, rank, score) {
    // Fire-and-forget — don't block navigation
    fetch('/click', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({q, docno, rank, score}),
      keepalive: true,   // survives page navigation
    }).catch(() => {});
  }

  // ── PRD-024: Cite this ────────────────────────────────────────────────
  //
  // Pure client-side citation generator + popover. Builds APA, MLA,
  // Chicago, Harvard, BibTeX strings from the result's title + URL +
  // today's date. Each row has a Copy button. Closes on Escape /
  // click-outside / explicit ×. Only one popover open at a time.

  const CITE_ICON_SVG = '<svg viewBox="0 0 20 20" aria-hidden="true">' +
    '<path d="M5 4h7l3 3v9H5z"/>' +
    '<path d="M12 4v3h3"/>' +
    '<line x1="7.5" y1="11" x2="12.5" y2="11"/>' +
    '<line x1="7.5" y1="13.5" x2="12.5" y2="13.5"/>' +
    '</svg>';

  const MONTH_LONG = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
  const MONTH_BIB  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function citeFormatDate(d, style) {
    const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    if (style === 'apa')     return `${MONTH_LONG[m]} ${day}, ${y}`;
    if (style === 'mla')     return `${day} ${MONTH_LONG[m]} ${y}`;
    if (style === 'chicago') return `${MONTH_LONG[m]} ${day}, ${y}`;
    if (style === 'harvard') return `${day} ${MONTH_LONG[m]} ${y}`;
    if (style === 'bibtex')  return `${day}-${MONTH_BIB[m]}-${y}`;
    return d.toISOString().slice(0, 10);
  }

  // Generates the 5 standard citation strings. Matches Wikipedia's own
  // cite-tool conventions: author = "Wikipedia contributors", year =
  // current year, retrieved = today.
  function buildCitations({ title, url }) {
    const now = new Date();
    const year = now.getFullYear();
    const dateApa     = citeFormatDate(now, 'apa');
    const dateMla     = citeFormatDate(now, 'mla');
    const dateChicago = citeFormatDate(now, 'chicago');
    const dateHarvard = citeFormatDate(now, 'harvard');
    const dateBib     = citeFormatDate(now, 'bibtex');
    const bibKey = 'wiki:' + (url.split('/').pop() || title.replace(/\s+/g, ''));
    return [
      {
        // APA 7 cites the publication date as just year+month+day with no
        // extra year prefix — and "Retrieved <date>" already carries the
        // year too. Use APA's standard "(YYYY, Month DD)" form by
        // splitting dateApa back into its components.
        style: 'APA',
        text: `Wikipedia contributors. (${year}, ${MONTH_LONG[now.getMonth()]} ${now.getDate()}). ${title}. In Wikipedia, The Free Encyclopedia. Retrieved ${dateApa}, from ${url}`,
      },
      {
        style: 'MLA',
        text: `"${title}." Wikipedia, The Free Encyclopedia. Wikimedia Foundation, ${dateMla}. Web. ${dateMla}.`,
      },
      {
        style: 'Chicago',
        text: `Wikipedia contributors. "${title}." Wikipedia, The Free Encyclopedia. Last modified ${dateChicago}. ${url}.`,
      },
      {
        style: 'Harvard',
        text: `Wikipedia contributors (${year}) ${title}. Available at: ${url} (Accessed: ${dateHarvard}).`,
      },
      {
        style: 'BibTeX',
        text: `@misc{${bibKey},\n  author       = "Wikipedia contributors",\n  title        = "${title} --- {Wikipedia}{,} The Free Encyclopedia",\n  year         = "${year}",\n  url          = "${url}",\n  note         = "[Online; accessed ${dateBib}]"\n}`,
        monospace: true,
      },
    ];
  }

  // Tracks the currently-open popover so a second open closes the first.
  let _openCitePopover = null;

  function closeCitePopover(opts) {
    if (!_openCitePopover) return;
    const { popover, trigger, listeners } = _openCitePopover;
    popover.remove();
    document.removeEventListener('keydown', listeners.key);
    document.removeEventListener('click', listeners.outside, true);
    // Only return focus to the trigger when the user dismissed
    // explicitly (Escape, ×, click outside). If we're closing because
    // they clicked a different trigger, leave focus alone — the new
    // popover will focus its own first Copy button.
    if (!(opts && opts.skipFocusRestore) && trigger && trigger.focus) {
      trigger.focus();
    }
    _openCitePopover = null;
  }

  function openCitePopover(triggerEl, { title, url, docno }) {
    closeCitePopover({ skipFocusRestore: true });
    const cites = buildCitations({ title, url });
    const pop = document.createElement('div');
    pop.className = 'cite-popover';
    pop.setAttribute('role', 'dialog');
    pop.setAttribute('aria-label', 'Cite ' + title);
    pop.innerHTML =
      '<div class="cite-popover-header">' +
        '<strong></strong>' +
        '<button class="cite-popover-close" type="button" aria-label="Close">×</button>' +
      '</div>' +
      cites.map((c, i) =>
        '<div class="cite-row">' +
          '<div class="cite-row-head">' +
            '<span class="cite-style-name">' + c.style + '</span>' +
            '<button class="cite-copy" type="button" data-i="' + i + '" ' +
              'aria-label="Copy ' + c.style + ' citation">Copy</button>' +
          '</div>' +
          '<div class="cite-text' + (c.monospace ? ' bibtex' : '') + '"></div>' +
        '</div>'
      ).join('');
    // Set text content via DOM (not innerHTML) so unescaped chars in
    // the citation strings can't break out.
    pop.querySelector('.cite-popover-header strong').textContent = 'Cite "' + title + '"';
    pop.querySelectorAll('.cite-text').forEach((el, i) => {
      el.textContent = cites[i].text;
    });

    // Position the popover. Default: below trigger, right-aligned to it
    // so it doesn't spill off screen. Flips above if no room. On
    // mobile (≤640) the CSS makes it a bottom-sheet so positioning
    // is moot.
    document.body.appendChild(pop);
    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    if (!isMobile) {
      const r = triggerEl.getBoundingClientRect();
      const popH = pop.offsetHeight;
      const popW = pop.offsetWidth;
      const spaceBelow = window.innerHeight - r.bottom;
      const top = (spaceBelow >= popH + 16 || r.top < popH + 16)
        ? window.scrollY + r.bottom + 8
        : window.scrollY + r.top - popH - 8;
      let left = window.scrollX + r.right - popW;
      if (left < 8) left = 8;
      pop.style.top  = top + 'px';
      pop.style.left = left + 'px';
    }

    // Wire close handlers
    const closeBtn = pop.querySelector('.cite-popover-close');
    closeBtn.addEventListener('click', closeCitePopover);

    // Wire copy buttons
    pop.querySelectorAll('.cite-copy').forEach(btn => {
      btn.addEventListener('click', e => {
        const i = parseInt(btn.dataset.i, 10);
        const text = cites[i].text;
        copyToClipboard(text).then(ok => {
          if (!ok) return;
          const original = btn.textContent;
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = original;
            btn.classList.remove('copied');
          }, 1500);
          // Telemetry: log via the existing /click endpoint with a
          // sentinel rank/score so it's distinguishable from real
          // clicks in the log analyser.
          fetch('/click', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              q: 'cite:' + cites[i].style.toLowerCase(),
              docno: docno || '',
              rank: -1,
              score: -1,
            }),
            keepalive: true,
          }).catch(() => {});
        });
      });
    });

    // Esc / click-outside
    const onKey = e => {
      if (e.key === 'Escape') {
        e.stopPropagation();
        closeCitePopover();
      }
    };
    const onOutside = e => {
      if (pop.contains(e.target) || triggerEl.contains(e.target)) return;
      closeCitePopover();
    };
    document.addEventListener('keydown', onKey);
    // capture-phase click so we close before any child handlers fire
    document.addEventListener('click', onOutside, true);

    _openCitePopover = {
      popover: pop,
      trigger: triggerEl,
      listeners: { key: onKey, outside: onOutside },
    };

    // Focus the first Copy button for keyboard users
    const firstCopy = pop.querySelector('.cite-copy');
    if (firstCopy) firstCopy.focus();
  }

  // Clipboard helper with a textarea fallback for older browsers.
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
    }
    return new Promise(resolve => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-1000px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); resolve(true); }
      catch { resolve(false); }
      finally { ta.remove(); }
    });
  }

  // Builds the markup for a Cite trigger that can be embedded in a
  // result card or knowledge panel. Returns an HTML string.
  function citeTriggerHtml() {
    return '<button class="cite-trigger" type="button" aria-label="Cite this result">'
      + CITE_ICON_SVG + '<span>Cite</span></button>';
  }

  // Event delegation: a single document-level click handler opens the
  // right popover when any cite-trigger is clicked. Avoids per-result
  // event registration as the list re-renders.
  document.addEventListener('click', e => {
    const trigger = e.target.closest('.cite-trigger');
    if (!trigger) return;
    e.preventDefault();
    e.stopPropagation();
    // If clicking the same trigger again, close.
    if (_openCitePopover && _openCitePopover.trigger === trigger) {
      closeCitePopover();
      return;
    }
    const title = trigger.dataset.title || '';
    const url   = trigger.dataset.url   || '';
    const docno = trigger.dataset.docno || '';
    if (!title || !url) return;
    openCitePopover(trigger, { title, url, docno });
  });

  // PRD-018: tiny markdown renderer for knowledge-panel summaries.
  // Supports paragraphs, **bold**, and `-`/`*` bullet lists. Anything
  // else is rendered as escaped plain text. We avoid a full markdown
  // lib because the summary format is small and well-defined, and we
  // want HTML-safe output by construction.
  function renderMarkdown(md) {
    if (!md) return '';
    const lines = String(md).split(/\r?\n/);
    const html = [];
    let para = [];
    let inList = false;

    const flushPara = () => {
      if (para.length) {
        html.push('<p>' + applyInline(para.join(' ')) + '</p>');
        para = [];
      }
    };
    const flushList = () => {
      if (inList) { html.push('</ul>'); inList = false; }
    };
    const applyInline = s => {
      // Escape first, then replace **bold** patterns with <strong>.
      const escaped = esc(s);
      return escaped.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    };

    for (const raw of lines) {
      const line = raw.trim();
      if (!line) {
        flushPara();
        flushList();
        continue;
      }
      const bullet = line.match(/^[-*]\s+(.+)$/);
      if (bullet) {
        flushPara();
        if (!inList) { html.push('<ul>'); inList = true; }
        html.push('<li>' + applyInline(bullet[1]) + '</li>');
      } else {
        flushList();
        para.push(line);
      }
    }
    flushPara();
    flushList();
    return html.join('');
  }

  const proxyImg = url => url ? `/img?url=${encodeURIComponent(url)}` : null;
  const wikiLink = r => r.url || `https://en.wikipedia.org/wiki/${encodeURIComponent(r.docno)}`;
  const formatTitle = docno => (docno || '').replace(/_/g, ' ').replace(/\s*\(.*?\)\s*$/, '').trim();
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // Highlight query terms in a snippet string.
  // Escapes HTML first, then wraps whole-word matches in <b>.
  // Case-insensitive; ignores very short words (≤2 chars) and stop words.
  const HIGHLIGHT_STOP = new Set([
    'a','an','the','and','or','but','in','on','at','to','for','of','with',
    'by','from','is','are','was','were','it','its','this','that','as','not',
    'be','been','have','has','had','do','does','did','so','if','no','up',
  ]);
  function highlightQuery(snippet, query) {
    if (!snippet || !query) return esc(snippet || '');
    try {
      // Strip phrase quotes so highlight matches words, not "ozzy or osbourne"
      const terms = query.trim().toLowerCase().replace(/"/g, ' ').split(/\s+/)
        .filter(t => t.length > 2 && !HIGHLIGHT_STOP.has(t))
        .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      if (!terms.length) return esc(snippet);
      // Split on term matches BEFORE escaping, so we don't corrupt HTML entities.
      // Walk the snippet, find matches case-insensitively, escape each piece.
      const pattern = new RegExp(`(${terms.join('|')})`, 'gi');
      const parts = snippet.split(pattern);
      const termSet = new Set(terms.map(t => t.toLowerCase()));
      return parts.map(p => {
        if (termSet.has(p.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))) {
          return '<b>' + esc(p) + '</b>';
        }
        return esc(p);
      }).join('');
    } catch (e) {
      return esc(snippet);
    }
  }
</script>
</body>
